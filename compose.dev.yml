services:
  vector-db:
    image: postgres:16-alpine
    container_name: vector-db-dev
    environment:
      POSTGRES_DB: vector
      POSTGRES_USER: vector
      POSTGRES_PASSWORD: vector_pass
    ports:
      - "5434:5432"
    volumes:
      - vector_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vector_pgdata:
